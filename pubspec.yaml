name: gauge_indicator
description: An animated, highly customizable, open source, Flutter gauge widget.
version: 0.6.0
homepage: https://github.com/gonuit/gauge_indicator

environment:
  sdk: ">=3.9.0 <4.0.0"
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

scripts:
  test:
    $script:
      $linux: flutter test
      $macos: |
        docker run --rm --platform linux/amd64 \
          -v "$(pwd)":/repo -w /repo \
          ghcr.io/cirruslabs/flutter:3.35.0 \
          bash -c "flutter pub get --no-example && flutter test"
  update-goldens:
    $script:
      $linux: flutter test --update-goldens
      $macos: |
        docker run --rm --platform linux/amd64 \
          -v "$(pwd)":/repo -w /repo \
          ghcr.io/cirruslabs/flutter:3.35.0 \
          bash -c "flutter pub get --no-example && flutter test --update-goldens"

funding:
  - https://www.paypal.com/donate/?hosted_button_id=Z82R98MAR4URE
  - https://www.buymeacoffee.com/kamilklyta

topics:
  - widgets
  - animation
  - gauge
  - gauge-indicator
  - gauges

screenshots:
  - description: The gauge_indicator package thumbnail.
    path: thumbnail.png
